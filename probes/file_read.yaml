probes: 
  - id: nfs-file-read
    title: 客户端 NFS 读文件
    layer: nfs
    level: L2
    scene: 度量客户端侧 NFS 文件的单次读延迟与大小
    entrypoints:
      - kprobe/nfs_file_read
      - kretprobe/nfs_file_read
    supported_ops: [nfs_file_read]
    params: 
      - filter_pid: u32
      - is_collect_file_name: bool
    outputs:
      queue: io_events
      fields: [pid, comm, time_stamp_ns, lat_ns, size_bytes, file]
    cost_estimate:
      event_rate: medium
      cpu: low
      map_mem: low
    risks: 高并发 I/O 场景下全量追踪可能有开销，可酌情采样
    example_evidence:
      op: read
      pid: 1234
      comm: nfsd
      file: /mnt/nfs/foo
      lat_us: 120
      size_bytes: 4096