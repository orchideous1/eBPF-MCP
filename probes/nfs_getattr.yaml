probes:
  - type: nfs_getattr
    title: 获取文件属性
    layer: nfs-client
    level: L2
    scene: 度量NFS-Client侧获取文件属性请求的延迟
    entrypoints:
      - nfs_getattr
    params:
      - name: filter_pid
        type: u32
        description: 目标进程ID，用于过滤特定进程的NFS getattr事件
        optional: true
        example: 1234
      - name: filter_file
        type: string
        description: 过滤指定文件名（支持通配符*和?）
        optional: true
        example: "*.txt"
    outputs:
      fields:
        - name: pid
          type: u32
          description: 发起NFS getattr请求的进程ID
        - name: comm
          type: str
          description: 发起NFS getattr请求的进程名称（最多16字符）
        - name: time_stamp
          type: u64
          description: 事件发生的绝对时间戳（纳秒级，自系统启动以来的时间）
        - name: lat
          type: u64
          description: NFS getattr请求的延迟（纳秒），从请求发出到完成的时间
        - name: ret
          type: s64
          description: NFS getattr请求的返回值（0表示成功，负数表示错误码）
        - name: file
          type: str
          description: 目标文件名（最多16字符）
    risks: medium
    risk-description: 高并发 I/O 场景下全量追踪可能有开销，可采用filter_pid\filter_file\filter_comm进行进程追踪
