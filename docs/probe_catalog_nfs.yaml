###########################################################################
# NFS 探针知识库（草案，Step 1）
# 目的：为 MCP/智能体提供现有 NFS eBPF 探针的结构化元数据。
# 范围：bpf/nfs_trace.c 与 headers/nfsd.h 已实现的探针。
# 约定：
#   layer: syscall | vfs | nfs_op | rpc | nfsd_server | net/xdr
#   level: L1（低开销）| L2（中等）| L3（高/啰嗦）
#   cost_estimate：粗粒度提示，需后续实测校准。
#   outputs.map / outputs.queue：对应 BPF map/queue 名称。
#   params：当前可调参数，用户态接入后可扩展。
###########################################################################

catalog_version: 0.1.0
source_commit: TBD  # 发布时填写 git sha
probes:

  - id: vfs-nfs-file-read
    title: 客户端 VFS 读延迟
    layer: vfs
    level: L1
    scene: 度量客户端侧 NFS 文件的单次读延迟与大小
    entrypoints:
      - kprobe/nfs_file_read
      - kretprobe/nfs_file_read
    supported_ops: [nfs_file_read]
    params:
      - name: filter_pid
        type: u32
        description: 仅当 PID 匹配时追踪；0 表示不过滤
    defaults:
      sampling: none
      duration_hint_s: 30
    outputs:
      queue: io_events
      fields: [pid, comm, time_stamp_ns, lat_ns, size_bytes, file]
    cost_estimate:
      event_rate: medium
      cpu: low
      map_mem: low
    requires:
      capabilities: [CAP_BPF]
      btf: preferred
    risks: 高并发 I/O 场景下全量追踪可能有开销，可酌情采样
    example_evidence:
      op: read
      pid: 1234
      comm: nfsd
      file: /mnt/nfs/foo
      lat_us: 120
      size_bytes: 4096

  - id: vfs-nfs-file-write
    title: 客户端 VFS 写延迟
    layer: vfs
    level: L1
    scene: 度量客户端侧 NFS 文件的单次写延迟与大小
    entrypoints:
      - kprobe/nfs_file_write
      - kretprobe/nfs_file_write
      - kprobe/iter_file_splice_write
      - kretprobe/iter_file_splice_write
    supported_ops: [nfs_file_write, iter_file_splice_write]
    params:
      - name: filter_pid
        type: u32
        description: 仅当 PID 匹配时追踪；0 表示不过滤
    defaults:
      sampling: none
      duration_hint_s: 30
    outputs:
      queue: io_events
      fields: [pid, comm, time_stamp_ns, lat_ns, size_bytes, file]
    cost_estimate:
      event_rate: medium
      cpu: low
      map_mem: low
    requires:
      capabilities: [CAP_BPF]
      btf: preferred
    risks: 重写负载下 queue 可能积压，可结合采样/窗口读取
    example_evidence:
      op: write
      pid: 2345
      comm: nfsd
      file: /mnt/nfs/bar
      lat_us: 180
      size_bytes: 8192

  - id: rpc-task-lifecycle
    title: RPC 任务时延（客户端）
    layer: rpc
    level: L2
    scene: 度量 RPC 任务唤醒/结束时延，包含错误捕获
    entrypoints:
      - kprobe/rpc_execute
      - tracepoint/sunrpc/rpc_task_begin
      - tracepoint/sunrpc/rpc_task_wakeup
      - tracepoint/sunrpc/rpc_task_call_done
      - tracepoint/sunrpc/rpc_task_end
    supported_ops: [rpc_task_begin, rpc_task_wakeup, rpc_task_call_done, rpc_task_end, rpc_execute]
    params: []
    defaults:
      sampling: none
      duration_hint_s: 30
    outputs:
      queue: rpc_events
      fields: [tk_owner_pid, proc, timestamp_ns, wake_lat_ns, end_lat_ns, end_action]
      errors_queue: nfs_error_events
      error_fields: [pid, proc, error_status, time_stamp_ns]
    cost_estimate:
      event_rate: medium
      cpu: low
      map_mem: medium  # rpc_start 以 (task_id, client_id) 为键
    requires:
      capabilities: [CAP_BPF]
      btf: preferred
    risks: 任务 churn 过高时 rpc_start 可能被顶出；需关注 MAX_ENTRIES 配置
    example_evidence:
      proc: nfs4_read
      tk_owner_pid: 3456
      wake_lat_us: 50
      end_lat_us: 220
      error_status: 0

  - id: nfsd-op-latency
    title: 服务器 NFSd 单操作时延（按 op 与 xid）
    layer: nfsd_server
    level: L2
    scene: 服务器侧 NFSv4/v4.1/v4.2 操作时延，键为 op+pid+xid
    entrypoints:
      - kprobe/nfsd4_* (entry)
      - kretprobe/nfsd4_* (exit)
    supported_ops:
      [nfsd4_access, nfsd4_close, nfsd4_commit, nfsd4_create, nfsd4_delegreturn,
       nfsd4_getattr, nfsd4_getfh, nfsd4_link, nfsd4_lock, nfsd4_lockt, nfsd4_locku,
       nfsd4_lookup, nfsd4_lookupp, nfsd4_nverify, nfsd4_open, nfsd4_open_confirm,
       nfsd4_open_downgrade, nfsd4_putfh, nfsd4_putrootfh, nfsd4_read, nfsd4_readdir,
       nfsd4_readlink, nfsd4_remove, nfsd4_rename, nfsd4_renew, nfsd4_restorefh,
       nfsd4_savefh, nfsd4_secinfo, nfsd4_setattr, nfsd4_setclientid,
       nfsd4_setclientid_confirm, nfsd4_verify, nfsd4_write, nfsd4_release_lockowner,
       nfsd4_exchange_id, nfsd4_backchannel_ctl, nfsd4_bind_conn_to_session,
       nfsd4_create_session, nfsd4_destroy_session, nfsd4_sequence, nfsd4_destroy_clientid,
       nfsd4_reclaim_complete, nfsd4_secinfo_no_name, nfsd4_test_stateid,
       nfsd4_free_stateid, nfsd4_getdeviceinfo, nfsd4_layoutget, nfsd4_layoutcommit,
       nfsd4_layoutreturn, nfsd4_allocate, nfsd4_deallocate, nfsd4_clone, nfsd4_copy,
       nfsd4_seek, nfsd4_offload_status, nfsd4_offload_cancel, nfsd4_copy_notify,
       nfsd4_getxattr, nfsd4_setxattr, nfsd4_listxattrs, nfsd4_removexattr]
    op_groups:
      common_high_freq: [nfsd4_read, nfsd4_write, nfsd4_getattr, nfsd4_setattr, nfsd4_lookup, nfsd4_readdir, nfsd4_access]
      session_mgmt: [nfsd4_create_session, nfsd4_destroy_session, nfsd4_sequence, nfsd4_bind_conn_to_session, nfsd4_exchange_id, nfsd4_destroy_clientid, nfsd4_reclaim_complete]
      lock_state: [nfsd4_lock, nfsd4_lockt, nfsd4_locku, nfsd4_release_lockowner, nfsd4_test_stateid, nfsd4_free_stateid]
      layout_pnfs: [nfsd4_getdeviceinfo, nfsd4_layoutget, nfsd4_layoutcommit, nfsd4_layoutreturn]
      data_movement: [nfsd4_copy, nfsd4_clone, nfsd4_seek, nfsd4_offload_status, nfsd4_offload_cancel, nfsd4_copy_notify]
      xattr: [nfsd4_getxattr, nfsd4_setxattr, nfsd4_listxattrs, nfsd4_removexattr]
    supported_ops_detail:
      - nfsd4_access: 访问权限检查
      - nfsd4_close: 关闭文件
      - nfsd4_commit: 提交已写数据（稳定化）
      - nfsd4_create: 创建文件/目录
      - nfsd4_delegreturn: 归还委托
      - nfsd4_getattr: 获取属性
      - nfsd4_getfh: 获取文件句柄
      - nfsd4_link: 创建硬链接
      - nfsd4_lock: 加锁
      - nfsd4_lockt: 测试锁
      - nfsd4_locku: 解锁
      - nfsd4_lookup: 路径查找
      - nfsd4_lookupp: 父目录查找
      - nfsd4_nverify: 属性不等验证
      - nfsd4_open: 打开文件
      - nfsd4_open_confirm: 打开确认
      - nfsd4_open_downgrade: 打开降级
      - nfsd4_putfh: 设置当前文件句柄
      - nfsd4_putrootfh: 切换根句柄
      - nfsd4_read: 读文件
      - nfsd4_readdir: 读目录
      - nfsd4_readlink: 读符号链接
      - nfsd4_remove: 删除文件
      - nfsd4_rename: 重命名
      - nfsd4_renew: 续租
      - nfsd4_restorefh: 恢复保存的句柄
      - nfsd4_savefh: 保存当前句柄
      - nfsd4_secinfo: 查询安全信息
      - nfsd4_setattr: 设置属性
      - nfsd4_setclientid: 设置客户端 ID
      - nfsd4_setclientid_confirm: 确认客户端 ID
      - nfsd4_verify: 属性等验证
      - nfsd4_write: 写文件
      - nfsd4_release_lockowner: 释放锁拥有者
      - nfsd4_exchange_id: 交换客户端/服务端 ID
      - nfsd4_backchannel_ctl: 后向通道控制
      - nfsd4_bind_conn_to_session: 绑定连接到会话
      - nfsd4_create_session: 创建会话
      - nfsd4_destroy_session: 销毁会话
      - nfsd4_sequence: 序列控制
      - nfsd4_destroy_clientid: 销毁客户端 ID
      - nfsd4_reclaim_complete: 回收完成
      - nfsd4_secinfo_no_name: 无名安全信息
      - nfsd4_test_stateid: 测试 stateid
      - nfsd4_free_stateid: 释放 stateid
      - nfsd4_getdeviceinfo: 获取设备信息（pNFS）
      - nfsd4_layoutget: 获取布局（pNFS）
      - nfsd4_layoutcommit: 提交布局（pNFS）
      - nfsd4_layoutreturn: 归还布局（pNFS）
      - nfsd4_allocate: 预分配空间
      - nfsd4_deallocate: 释放空间
      - nfsd4_clone: 克隆数据
      - nfsd4_copy: 拷贝数据
      - nfsd4_seek: 定位
      - nfsd4_offload_status: 查询卸载状态
      - nfsd4_offload_cancel: 取消卸载
      - nfsd4_copy_notify: 拷贝通知
      - nfsd4_getxattr: 获取扩展属性
      - nfsd4_setxattr: 设置扩展属性
      - nfsd4_listxattrs: 列出扩展属性
      - nfsd4_removexattr: 删除扩展属性
    params: []
    defaults:
      sampling: none
      duration_hint_s: 30
    outputs:
      queue: nfsd_op_events
      fields: [timestamp_ns, latency_us, pid, xid, op, comm]
    cost_estimate:
      event_rate: medium-high  # 视负载而定
      cpu: medium
      map_mem: medium  # nfsd_op_starts 以 op,pid 为键
    requires:
      capabilities: [CAP_BPF]
      btf: preferred
    risks: op 种类多时 queue 可能反压；可在用户态做 top-N 聚合
    example_evidence:
      op: nfsd4_write
      xid: 0x1234
      pid: 4567
      latency_us: 540
      comm: nfsd

  - id: nfs-client-func-latency
    title: 客户端 nfs_* 函数时延（广覆盖）
    layer: nfs_op
    level: L3
    scene: 对大量 nfs_* 客户端函数（文件/目录/dentry 操作）进行时延调试
    entrypoints:
      - kprobe/nfs_*（由 nfs_trace.c 中 DEFINE_FUNC_TRACE 定义的集合）
      - kretprobe/nfs_* 对应退出
    supported_ops:
      [nfs_file_mmap, nfs4_file_open, nfs4_file_flush, nfs_file_release, nfs_file_fsync,
       nfs_lock, nfs_flock, nfs_check_flags, nfs4_setlease, nfs4_copy_file_range,
       nfs4_file_llseek, nfs42_fallocate, nfs42_remap_file_range, nfs_create, nfs_lookup,
       nfs_atomic_open, nfs_link, nfs_unlink, nfs_symlink, nfs_mkdir, nfs_rmdir,
       nfs_mknod, nfs_rename, nfs_getattr, nfs_setattr, nfs4_listxattr,
       nfs4_lookup_revalidate, nfs_weak_revalidate, nfs_dentry_delete,
       nfs_dentry_iput, nfs_d_automount, nfs_d_release, nfs_permission]
    op_groups:
      common_high_freq: [nfs_lookup, nfs_getattr, nfs_setattr, nfs_read, nfs_write, nfs_create, nfs_rename, nfs_unlink, nfs_mkdir, nfs_rmdir]
      cache_revalidate: [nfs4_lookup_revalidate, nfs_weak_revalidate, nfs_dentry_delete, nfs_dentry_iput, nfs_d_release]
      xattr: [nfs4_listxattr]
      locking: [nfs_lock, nfs_flock]
      layout_space: [nfs42_fallocate, nfs42_remap_file_range]
      copy_move: [nfs4_copy_file_range, nfs_atomic_open, nfs_link, nfs_symlink]
    supported_ops_detail:
      - nfs_file_mmap: 内存映射处理
      - nfs4_file_open: 打开文件
      - nfs4_file_flush: 刷新写回
      - nfs_file_release: 释放文件
      - nfs_file_fsync: 同步写回
      - nfs_lock: 加锁
      - nfs_flock: flock 锁
      - nfs_check_flags: 检查标志
      - nfs4_setlease: 设置租约
      - nfs4_copy_file_range: 跨文件复制范围
      - nfs4_file_llseek: 定位偏移
      - nfs42_fallocate: 预分配
      - nfs42_remap_file_range: 重新映射范围
      - nfs_create: 创建
      - nfs_lookup: 查找
      - nfs_atomic_open: 原子打开
      - nfs_link: 硬链接
      - nfs_unlink: 删除
      - nfs_symlink: 符号链接
      - nfs_mkdir: 创建目录
      - nfs_rmdir: 删除目录
      - nfs_mknod: 创建设备节点
      - nfs_rename: 重命名
      - nfs_getattr: 获取属性
      - nfs_setattr: 设置属性
      - nfs4_listxattr: 列出扩展属性
      - nfs4_lookup_revalidate: 查找并校验缓存
      - nfs_weak_revalidate: 弱校验
      - nfs_dentry_delete: 删除 dentry
      - nfs_dentry_iput: 释放 dentry inode 引用
      - nfs_d_automount: 自动挂载处理
      - nfs_d_release: 释放 dentry
      - nfs_permission: 权限检查
    params:
      - name: delay_probability
        type: u64
        description: 仅用于 nfs_permission 的注入延迟；默认 1，或设 0 关闭
      - name: all_delay_us
        type: u32
        description: nfs_permission 测试路径的延迟大小
    defaults:
      sampling: none
      duration_hint_s: 15
    outputs:
      queue: op_events
      fields: [timestamp_ns, latency_us, pid, op, comm]
    cost_estimate:
      event_rate: high  # 覆盖面广
      cpu: medium-high
      map_mem: medium  # starts 哈希以 tid 为键
    requires:
      capabilities: [CAP_BPF]
      btf: preferred
    risks: 事件量大，建议在更窄的探针不足时再启用
    example_evidence:
      op: nfs_lookup
      pid: 5678
      comm: nginx
      latency_us: 75

  - id: nfsd-rpc-server-xdr
    title: 服务器端 XDR 收发时序（tracepoints）
    layer: net/xdr
    level: L3
    scene: 观察 svc_xdr_recvfrom/sendto 时序并关联 xid
    entrypoints:
      - tracepoint/sunrpc/svc_xdr_recvfrom
      - tracepoint/sunrpc/svc_xdr_sendto
      - tracepoint/sunrpc/svc_send
    params: []
    defaults:
      sampling: none
      duration_hint_s: 15
    outputs:
      log: bpf_printk  # 目前仅 printk，尚未落队列
    cost_estimate:
      event_rate: medium
      cpu: low
      map_mem: low
    requires:
      capabilities: [CAP_BPF]
      btf: preferred
    risks: printk 噪声大，上线前应改为 queue
    example_evidence:
      xid: 0x9abc
      timestamp_ns: 123456789
      status: 0
